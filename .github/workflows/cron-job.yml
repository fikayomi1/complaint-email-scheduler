name: Email Scheduling Cron Job Workflow

on:
  schedule:
    - cron: '0 6 * * *'   # 8:00 AM WAT (UTC+1)
    - cron: '0 14 * * *'  # 4:00 PM WAT (UTC+1)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send email
        run: |
          HOUR=$(TZ="Africa/Lagos" date +%-H)
          if [ "$HOUR" -lt 12 ]; then
            node index.js morning
          else
            node index.js night
          fi
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          ISSUE_START_DATE: ${{ secrets.ISSUE_START_DATE }}
